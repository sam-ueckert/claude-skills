# Baseline Playbook Standard v1.0
# All playbooks generated by playbook-generator must conform to this schema.
# Org overrides layer on top of these requirements.

metadata:
  required_fields:
    - title
    - author
    - version
    - last_reviewed
    - approval_status   # Draft | Under Review | Approved
  optional_fields:
    - jira_ticket
    - change_request_id
    - review_cadence     # e.g., "quarterly"

naming:
  pattern: "PB-{TEAM}-{SEQ}"
  description: "Override via org standard to set team prefix and sequence format"

required_sections:
  - name: purpose
    description: "Why this playbook exists — one paragraph"
    required: true

  - name: scope
    description: "Systems, services, and environments covered"
    required: true

  - name: prerequisites
    description: "Conditions that must be true before execution"
    required: true
    format: bullet_list

  - name: procedure
    description: "Ordered steps to execute"
    required: true
    step_schema:
      required_fields:
        - step_number
        - action          # Must start with imperative verb
        - role            # Who performs this step
        - expected_outcome
      optional_fields:
        - if_failed       # Contingency for this specific step
        - duration_estimate
        - automation_ref  # Link to script/tool that automates this step

  - name: rollback
    description: "Steps to reverse the procedure"
    required: true
    note: "Every playbook must have a rollback. If rollback is not possible, state why."

  - name: verification
    description: "How to confirm the playbook achieved its intended outcome"
    required: true

  - name: deviations
    description: "Inline overrides from standard, with justification"
    required: true
    default_value: "None"

formatting:
  step_action_style: imperative_verb  # "Restart the service" not "The service is restarted"
  heading_levels:
    playbook_title: h1
    section: h2
    step: h3
  metadata_display: table
