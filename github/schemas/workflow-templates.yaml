# GitHub Actions workflow templates
# Selected automatically based on project type from env-scaffolder

templates:

  python:
    filename: .github/workflows/ci.yaml
    content: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            - run: pip install -r requirements.txt
            - run: pip install pytest ruff
            - run: ruff check .
            - run: pytest -v
        docker:
          needs: test
          if: github.ref == 'refs/heads/main'
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/build-push-action@v5
              with:
                push: false
                tags: app:latest

  node:
    filename: .github/workflows/ci.yaml
    content: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: "20"
            - run: npm ci
            - run: npm run lint
            - run: npm test

  terraform:
    filename: .github/workflows/terraform.yaml
    content: |
      name: Terraform
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        plan:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: hashicorp/setup-terraform@v3
            - run: terraform fmt -check
            - run: terraform init
            - run: terraform validate
            - run: terraform plan -no-color
              if: github.event_name == 'pull_request'

  docker:
    filename: .github/workflows/docker.yaml
    content: |
      name: Docker Build & Push
      on:
        push:
          branches: [main]
          tags: ["v*"]
      jobs:
        build:
          runs-on: ubuntu-latest
          permissions:
            contents: read
            packages: write
          steps:
            - uses: actions/checkout@v4
            - uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
            - uses: docker/build-push-action@v5
              with:
                push: true
                tags: ghcr.io/${{ github.repository }}:latest
